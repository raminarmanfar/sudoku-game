services:
  postgres:
    image: postgres:16-alpine
    container_name: sudoku-postgres
    environment:
      POSTGRES_DB: sudoku
      POSTGRES_USER: sudoku
      POSTGRES_PASSWORD: sudoku
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sudoku"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sudoku-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sudoku
      DB_USER: sudoku
      DB_PASSWORD: sudoku
      SERVER_PORT: 8090
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: sudoku-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
