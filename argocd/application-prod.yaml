apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sudoku-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sudoku
  source:
    repoURL: https://github.com/YOUR_ORG/sudoku
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: sudoku
  syncPolicy:
    # Manual sync for production — trigger from Jenkins after approval
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
